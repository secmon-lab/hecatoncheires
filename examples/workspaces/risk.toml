# Risk Management Workspace
# This configuration demonstrates a security risk management use case.
# Use with: hecatoncheires serve --config ./examples/workspaces/

[workspace]
id = "risk"
name = "Risk Management"
# Optional badge glyph. Mutually exclusive with `color`. When set, the UI shows
# this emoji on a neutral background instead of the auto-generated initials.
emoji = "🛡️"

[labels]
case = "Risk"

[slack]
# channel_prefix = "risk"  # Defaults to workspace ID if not specified
# team_id = "T0123456789"  # Required for org-level Slack apps; omit for workspace-level apps

[[fields]]
id = "category"
name = "Category"
type = "multi-select"
required = true
description = "Risk classification. Multiple values may apply; used as the aggregation axis for the quarterly risk report."
options = [
  { id = "data_breach", name = "Data Breach", description = "Risk of personal or confidential information leakage" },
  { id = "system_failure", name = "System Failure", description = "Risk of system or service downtime and failures" },
  { id = "compliance", name = "Compliance", description = "Risk of regulatory or internal policy violations" },
  { id = "supply_chain", name = "Supply Chain", description = "Risks related to external vendors and third-party services" },
  { id = "insider_threat", name = "Insider Threat", description = "Intentional or unintentional threats from employees" },
]

[[fields]]
id = "likelihood"
name = "Likelihood"
type = "select"
required = true
description = "How likely the risk is to materialise. Combined with impact (1–5 scale via metadata.score) into the risk matrix."
options = [
  { id = "very_low", name = "Very Low", description = "Extremely unlikely to occur", metadata = { score = 1 } },
  { id = "low", name = "Low", description = "Unlikely to occur", metadata = { score = 2 } },
  { id = "medium", name = "Medium", description = "Moderately likely to occur", metadata = { score = 3 } },
  { id = "high", name = "High", description = "Likely to occur", metadata = { score = 4 } },
  { id = "very_high", name = "Very High", description = "Very likely to occur", metadata = { score = 5 } },
]

[[fields]]
id = "impact"
name = "Impact"
type = "select"
required = true
description = "Business consequence if the risk materialises. The 1–5 score (via metadata.score) is paired with likelihood."
options = [
  { id = "negligible", name = "Negligible", description = "Little to no impact", metadata = { score = 1 } },
  { id = "minor", name = "Minor", description = "Limited impact", metadata = { score = 2 } },
  { id = "moderate", name = "Moderate", description = "Some business impact", metadata = { score = 3 } },
  { id = "major", name = "Major", description = "Significant impact", metadata = { score = 4 } },
  { id = "critical", name = "Critical", description = "Critical impact", metadata = { score = 5 } },
]

[[fields]]
id = "response_team"
name = "Response Team"
type = "multi-select"
required = false
options = [
  { id = "security_team", name = "Security Team" },
  { id = "infrastructure_team", name = "Infrastructure Team" },
  { id = "development_team", name = "Development Team" },
  { id = "compliance_team", name = "Compliance Team" },
]

[[fields]]
id = "deadline"
name = "Deadline"
type = "date"
required = false

# --- Event-driven Agent Jobs ---

# Auto-summarize a newly created case and post the summary to its Slack channel.
[[job]]
id = "summarize-on-create"
name = "Auto-summarize on creation"
description = "Summarize a newly opened risk case and post to its Slack channel."
events.case = { on = ["created"] }
prompt = """
Write a concise (3 lines or fewer) summary of this risk case and post it to the
case Slack channel via slack__post_to_case_channel. If additional investigation is
required, append a short note to the case description via case__update_case.
"""

# When a case closes, draft a retrospective action item.
[[job]]
id = "post-close-retro"
name = "Schedule retrospective on close"
events.case = { on = ["closed"] }
prompt = """
Create a retrospective action for this closed case via core__create_action and
announce it to relevant stakeholders via slack__post_to_case_channel.
"""

# Periodic stale-check.
[[job]]
id = "stale-check"
name = "Stale case check"
events.scheduled = { every = "1h" }
prompt = """
If this case has been idle for an extended period, remind the assignees on the case
Slack channel. Skip the reminder if a similar reminder already appears within the
last 24 hours.
"""
