# Recruitment Workspace
# This configuration demonstrates a recruitment tracking use case.
# Use with: hecatoncheires serve --config ./examples/workspaces/

[workspace]
id = "recruit"
name = "Recruitment"
# Optional badge background color (#RRGGBB). Mutually exclusive with `emoji`.
# When set, the initials badge uses a gradient derived from this color.
color = "#2cb38d"

[labels]
case = "Candidate"

[[fields]]
id = "position"
name = "Position"
type = "select"
required = true
options = [
  { id = "backend-engineer", name = "Backend Engineer" },
  { id = "frontend-engineer", name = "Frontend Engineer" },
  { id = "sre", name = "SRE" },
  { id = "product-manager", name = "Product Manager" },
  { id = "designer", name = "Designer" },
]

[[fields]]
id = "stage"
name = "Stage"
type = "select"
required = true
description = "Current stage of the hiring pipeline."
options = [
  { id = "screening", name = "Screening", description = "Resume / portfolio review." },
  { id = "first-interview", name = "First Interview", description = "Initial conversation with hiring manager." },
  { id = "technical-interview", name = "Technical Interview", description = "Hands-on technical assessment." },
  { id = "final-interview", name = "Final Interview", description = "Final round with leadership." },
  { id = "offer", name = "Offer", description = "Offer extended; awaiting candidate decision." },
  { id = "rejected", name = "Rejected", description = "Either side declined." },
]

[[fields]]
id = "source"
name = "Source"
type = "select"
required = false
options = [
  { id = "referral", name = "Referral" },
  { id = "direct-apply", name = "Direct Application" },
  { id = "agency", name = "Recruitment Agency" },
  { id = "linkedin", name = "LinkedIn" },
]

[[fields]]
id = "interview-date"
name = "Interview Date"
type = "date"
required = false

[[fields]]
id = "resume-url"
name = "Resume URL"
type = "url"
required = false

[[fields]]
id = "notes"
name = "Notes"
type = "text"
required = false
