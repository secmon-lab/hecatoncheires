# Hecatoncheires Configuration
# This example demonstrates a security risk management system setup
#
# Single-file configuration with workspace section.
# When using a single config file, the [workspace] section is optional.
# If omitted, workspace ID and name are derived from the filename.

[workspace]
id = "risk"
name = "Risk Management"

# Entity Labels: Customize the display names in the UI
[labels]
case = "Risk"      # Display "Risk" instead of "Case" in the UI

# Custom Field Definitions for Cases
# All fields defined here will be available in case forms and details

[[fields]]
id = "category"
name = "Category"
type = "multi-select"
required = true
description = "Risk classification. Multiple values may apply; used as the aggregation axis for risk reports."
options = [
  { id = "data_breach", name = "Data Breach", description = "Risk of personal or confidential information leakage" },
  { id = "system_failure", name = "System Failure", description = "Risk of system or service downtime and failures" },
  { id = "compliance", name = "Compliance", description = "Risk of regulatory or internal policy violations" },
  { id = "supply_chain", name = "Supply Chain", description = "Risks related to external vendors and third-party services" },
  { id = "insider_threat", name = "Insider Threat", description = "Intentional or unintentional threats from employees" },
]

[[fields]]
id = "likelihood"
name = "Likelihood"
type = "select"
required = true
description = "How likely the risk is to materialise. Score (1–5) lives in metadata."
options = [
  { id = "very_low", name = "Very Low", description = "Extremely unlikely to occur (less than once per year)", metadata = { score = 1 } },
  { id = "low", name = "Low", description = "Unlikely to occur (a few times per year)", metadata = { score = 2 } },
  { id = "medium", name = "Medium", description = "Moderately likely to occur (about once per month)", metadata = { score = 3 } },
  { id = "high", name = "High", description = "Likely to occur (about once per week)", metadata = { score = 4 } },
  { id = "very_high", name = "Very High", description = "Very likely to occur (almost daily)", metadata = { score = 5 } },
]

[[fields]]
id = "impact"
name = "Impact"
type = "select"
required = true
description = "Severity if the risk materialises. Score (1–5) lives in metadata."
options = [
  { id = "negligible", name = "Negligible", description = "Little to no impact on business operations", metadata = { score = 1 } },
  { id = "minor", name = "Minor", description = "Limited impact with no disruption to business continuity", metadata = { score = 2 } },
  { id = "moderate", name = "Moderate", description = "Some business impact requiring response", metadata = { score = 3 } },
  { id = "major", name = "Major", description = "Significant impact requiring urgent response", metadata = { score = 4 } },
  { id = "critical", name = "Critical", description = "Critical impact on business continuity", metadata = { score = 5 } },
]

[[fields]]
id = "response_team"
name = "Response Team"
type = "multi-select"
required = false
options = [
  { id = "security_team", name = "Security Team" },
  { id = "infrastructure_team", name = "Infrastructure Team" },
  { id = "development_team", name = "Development Team" },
  { id = "compliance_team", name = "Compliance Team" },
  { id = "business_team", name = "Business Team" },
]

[[fields]]
id = "specific_impact"
name = "Specific Impact"
type = "text"
required = false

[[fields]]
id = "detection_indicators"
name = "Detection Indicators"
type = "text"
required = false

[[fields]]
id = "deadline"
name = "Deadline"
type = "date"
required = false

[[fields]]
id = "reference_url"
name = "Reference URL"
type = "url"
required = false

# Slack integration (optional)
[slack]
channel_prefix = "risk"

# Workspace channel (optional, channel mode only): a workspace-level channel where
# the cross-case workspace agent runs. Not bound to any single case; @mention the
# bot there to read/act across every case you can access. The bot must be a member.
# workspace_channel = "C0123456789"   # channel ID, not name; unique across workspaces

# Optional custom instruction for the workspace agent. prompt and prompt_file are
# mutually exclusive; the built-in write-safety guardrail cannot be relaxed by it.
# [slack.workspace_agent]
# prompt = "This workspace tracks security risks. Prefer concise replies."
# prompt_file = "prompts/ws_agent.md"   # relative to this config file's directory

# Auto-invite: Automatically invite users and user group members when a case is created
[slack.invite]
users = ["U12345678", "U87654321"]              # Slack user IDs to auto-invite
groups = ["S0614TZR7", "@security-response"]    # User group IDs or @handle names

# Welcome messages: Sent automatically to the case channel after creation and
# initial member invitation. Each entry is a Go text/template string and may
# reference Case fields, custom Fields (by underscore-form ID), Workspace, and URL.
welcome_messages = [
  "<@{{.Case.ReporterID}}> さん、Case `{{.Case.Title}}` を起票しました。",
  """\
:rotating_light: 重要事項
- Status: {{.Case.Status}}
- Likelihood: {{.Fields.likelihood.name}}
- Impact: {{.Fields.impact.name}}
- Categories: {{range $i, $c := .Fields.category.items}}{{if $i}}, {{end}}{{$c.name}}{{end}}
- Reporter: <@{{.Case.ReporterID}}>
- Assignees: {{range $i, $a := .Case.AssigneeIDs}}{{if $i}}, {{end}}<@{{$a}}>{{end}}
- Detail: {{.URL}}""",
]

# Action statuses (optional)
# When the [action] section is omitted the workspace falls back to the
# built-in defaults: BACKLOG / TODO / IN_PROGRESS / BLOCKED / COMPLETED
# (initial = BACKLOG, closed = [COMPLETED]).
#
# Define [action] to tailor the workflow. `initial` picks the status assigned
# to newly created actions, and `closed` lists the ids treated as closed for
# filtering / completion checks. See docs/config.md → "Action Section" for
# the full list of accepted `color` preset names and other rules.
#
# [action]
# initial = "queued"
# closed  = ["done", "wont_fix"]
#
# [[action.status]]
# id = "queued"
# name = "Queued"
# color = "idle"
# emoji = "📋"
#
# [[action.status]]
# id = "doing"
# name = "Doing"
# color = "active"
# emoji = "▶️"
#
# [[action.status]]
# id = "review"
# name = "In Review"
# color = "waiting"
# emoji = "👀"
#
# [[action.status]]
# id = "done"
# name = "Done"
# color = "success"
# emoji = "✅"
#
# [[action.status]]
# id = "wont_fix"
# name = "Won't Fix"
# color = "neutral_done"
# emoji = "🚫"
