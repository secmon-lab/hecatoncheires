# Hecatoncheires E2E Test Configuration
# Minimal configuration for Playwright E2E testing

[workspace]
id = "test"
name = "E2E Test Workspace"

# Entity Labels
[labels]
case = "Case"

# Minimal field definitions for testing
[[fields]]
id = "category"
name = "Category"
type = "select"
required = true
options = [
  { id = "bug", name = "Bug" },
  { id = "feature", name = "Feature" },
  { id = "task", name = "Task" },
]

[[fields]]
id = "priority"
name = "Priority"
type = "select"
required = false
options = [
  { id = "low", name = "Low" },
  { id = "medium", name = "Medium" },
  { id = "high", name = "High" },
]

[[fields]]
id = "description"
name = "Description"
type = "text"
required = false

# Markdown custom field on Cases: sidebar shows a clamped raw preview,
# a modal renders it, and its editor offers a Write/Preview toggle.
[[fields]]
id = "runbook"
name = "Runbook"
type = "markdown"
required = false
description = "Markdown notes rendered in the Web UI."

# Enable case-scoped memos so the Memos E2E can create/archive/filter them.
# One optional field keeps memo creation title-only (no required-field gate).
[memo]
description = "E2E test memo definition."

[[memo.fields]]
id = "note"
name = "Note"
type = "text"
required = false
description = "Free-form note body."

# Markdown memo field: rendered in the memo detail modal and given a
# Write/Preview editor in the memo form.
[[memo.fields]]
id = "body"
name = "Body"
type = "markdown"
required = false
description = "Markdown body rendered in the Web UI."
