name: Unit test

on:
  push:
    paths:
      - 'pkg/**'
      - 'go.mod'
      - 'go.sum'
      - 'Taskfile.yml'
      - 'graphql/**'
      - 'frontend/**'
      - '.github/workflows/test.yml'

jobs:
  testing:
    runs-on: ubuntu-latest

    steps:
      - name: Run cicd-sensor
        uses: cicd-sensor/cicd-sensor-action@6ee257338e68af2b279b321b3346fe5f385aa498 # v0.0.29

      - name: Checkout upstream repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.head_ref }}

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: "go.mod"
          cache: true
          cache-dependency-path: go.sum

      - name: Start Firestore emulator
        run: |
          docker run -d --name firestore-emulator -p 28615:28615 \
            google/cloud-sdk@sha256:c2b7406c44f3aeaf2c90854337c65de4ac7a7ab07e2ab592eb8df140af1129b9 \
            gcloud emulators firestore start --host-port=0.0.0.0:28615
          for i in $(seq 1 90); do
            if curl -s http://127.0.0.1:28615/ >/dev/null 2>&1; then
              echo "emulator ready"; exit 0
            fi
            sleep 1
          done
          echo "firestore emulator did not become ready" >&2
          docker logs firestore-emulator || true
          exit 1

      # Run tests. FIRESTORE_EMULATOR_HOST routes the Firestore client to the
      # emulator; the repository test helper defaults the project/database ids.
      - name: Run tests
        env:
          FIRESTORE_EMULATOR_HOST: 127.0.0.1:28615
        run: go test ./... -timeout 30m
