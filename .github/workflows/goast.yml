name: goast

on:
  push:
    paths:
      - 'pkg/**'
      - '.goast/**'
      - '.goast.toml'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/goast.yml'

jobs:
  goast:
    name: goast policy
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      GO111MODULE: on
    steps:
      - name: Run cicd-sensor
        uses: cicd-sensor/cicd-sensor-action@6ee257338e68af2b279b321b3346fe5f385aa498 # v0.0.29

      - name: Checkout Source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: "go.mod"
          cache: true
          cache-dependency-path: go.sum

      # Pinned to a commit (not @latest) so the checked version is reproducible.
      # This commit adds the `goast test` subcommand used below.
      - name: Install goast
        run: go install github.com/m-mizutani/goast/cmd/goast@134058740ce7dee4a10b565da605a898dec94da4 # v0.2.x + goast test

      # OPA is needed to run the policies' own unit tests.
      - name: Install OPA
        uses: open-policy-agent/setup-opa@b2b258e089860efaadaaf71bf6e3aecb4a3eeff1 # v2.4.0
        with:
          version: 1.18.2

      # Unit-test the Rego policies first, so a broken policy fails fast and
      # clearly (before it is applied to the whole source tree). These fixtures
      # are hand-written AST JSON.
      - name: Unit-test policies (opa)
        run: opa test .goast

      # Run the policies through goast's real parse -> walk -> eval pipeline over
      # the Go fixtures in .goast/testdata, so the AST shapes the rules assume
      # (Fun.X.Name, Type.Params.List[0], DirName scoping, ...) are verified
      # against what the Go parser actually emits — the layer `opa test` cannot
      # cover because it feeds hand-authored JSON. See .goast.toml.
      - name: Test policies against real Go (goast test)
        run: goast test

      # Apply the policies to the Go source. Every policy file is listed
      # explicitly (rather than `-p .goast`) so the adjacent *_test.rego files
      # are NOT compiled into the evaluation — their test rules would otherwise
      # run on every AST node for no benefit. See .goast/README.md for the
      # policy catalog (intent, scope, and exemptions of each rule).
      - name: Check code
        run: |
          goast eval \
            -p .goast/no_fmt_print.rego \
            -p .goast/usecase_context_first.rego \
            -p .goast/no_slog_global.rego \
            -p .goast/no_strings_contains_error.rego \
            -p .goast/no_firestore_struct_tags.rego \
            -p .goast/repo_no_doc_converter.rego \
            -p .goast/no_discarded_close.rego \
            -p .goast/test_file_conventions.rego \
            --fail --ignore-auto-generated \
            ./pkg
