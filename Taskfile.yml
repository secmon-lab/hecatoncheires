# https://taskfile.dev

version: "3"

tasks:
  default:
    cmds:
      - task: graphql
      - task: mock

  graphql:
    desc: "Generate GraphQL code"
    cmds:
      - go tool gqlgen generate

  mock:
    aliases:
      - m
    desc: "Generate mock files"
    cmds:
      - echo "Mock generation will be added when interfaces are defined"

  test:
    desc: "Run the full Go test suite. Uses an extended timeout because the repository tests run against real Firestore (the per-package default of 10m is not enough); the *_Firestore tests run in parallel to keep wall-clock down. Run as `zenv task test` so TEST_FIRESTORE_PROJECT_ID is loaded."
    cmds:
      - go test ./... -timeout 30m

  test:firestore:
    desc: "Run the full test suite against a Firestore emulator in Docker (no GCP credentials or local JRE required). Needs Docker."
    cmds:
      - |
        docker rm -f hct-firestore-emulator >/dev/null 2>&1 || true
        docker run -d --name hct-firestore-emulator -p 28615:28615 \
          google/cloud-sdk@sha256:c2b7406c44f3aeaf2c90854337c65de4ac7a7ab07e2ab592eb8df140af1129b9 \
          gcloud emulators firestore start --host-port=0.0.0.0:28615
        trap 'docker rm -f hct-firestore-emulator >/dev/null 2>&1' EXIT
        i=0
        until curl -s http://127.0.0.1:28615/ >/dev/null 2>&1; do
          i=$((i+1))
          if [ "$i" -ge 90 ]; then
            echo "firestore emulator did not become ready" >&2
            docker logs hct-firestore-emulator || true
            exit 1
          fi
          sleep 1
        done
        FIRESTORE_EMULATOR_HOST=127.0.0.1:28615 go test ./... -timeout 30m

  test:e2e:
    desc: "Run E2E tests with Playwright (includes backend startup and teardown)"
    cmds:
      - ./frontend/scripts/e2e.sh

  lint:frontend:
    desc: "Run ESLint on the frontend"
    dir: frontend
    cmds:
      - pnpm lint
