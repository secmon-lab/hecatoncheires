scalar Time
scalar JSON
scalar Any

# Workspace
type Workspace {
  id: String!
  name: String!
}

# Field type definitions
enum FieldType {
  TEXT
  NUMBER
  SELECT
  MULTI_SELECT
  USER
  MULTI_USER
  DATE
  URL
}

type FieldOption {
  id: String!
  name: String!
  description: String
  metadata: JSON  # Arbitrary metadata (e.g., {"score": 4})
}

type FieldDefinition {
  id: String!
  name: String!
  type: FieldType!
  required: Boolean!
  description: String
  options: [FieldOption!]
}

type EntityLabels {
  case: String!
}

type FieldConfiguration {
  fields: [FieldDefinition!]!
  labels: EntityLabels!
  actionConfig: ActionConfig!
}

# ActionStatusDefinition describes a single action status configurable per
# workspace in TOML. `name` is the display label written by the workspace
# operator in whatever language they prefer. `color` is either a semantic
# preset name or a #RRGGBB hex code. See the user-facing config docs for
# the accepted preset list.
type ActionStatusDefinition {
  id: ID!
  name: String!
  description: String
  color: String
  emoji: String
}

# ActionConfig is the resolved per-workspace action status configuration.
# `initial` is the id of the status assigned to newly created actions.
# `closed` lists the status ids that are treated as closed for filtering /
# completion checks. `statuses` is the full ordered list to render.
type ActionConfig {
  initial: ID!
  closed: [ID!]!
  statuses: [ActionStatusDefinition!]!
}

# Custom field value
type FieldValue {
  fieldId: String!
  # Value encoded as JSON. Clients parse based on field type from FieldConfiguration.
  value: Any!
}

input FieldValueInput {
  fieldId: String!
  value: Any!
}

# Slack file attachment metadata
type SlackFile {
  id: String!
  name: String!
  mimetype: String!
  filetype: String!
  size: Int!
  urlPrivate: String!
  permalink: String!
  thumbURL: String
}

# Slack Message (stored in case sub-collection)
type SlackMessage {
  id: String!
  channelID: String!
  threadTS: String
  teamID: String!
  userID: String!
  userName: String!
  text: String!
  files: [SlackFile!]!
  createdAt: Time!
}

type SlackMessageConnection {
  items: [SlackMessage!]!
  nextCursor: String!
}

# CaseStatus is the lifecycle state of a Case.
# Lifecycle: DRAFT → OPEN → CLOSED (CLOSED can return to OPEN via reopenCase).
# DRAFT is reserved for entries saved through Slack's "Save as Draft" button
# on the case-creation modal; drafts are visible only to their reporter,
# excluded from the default `cases` listing, and surfaced through the
# dedicated `drafts` query.
enum CaseStatus {
  DRAFT
  OPEN
  CLOSED
}

# Channel user connection for paginated member lists
type ChannelUserConnection {
  items: [SlackUser!]!
  totalCount: Int!
  hasMore: Boolean!
}

# Entity types
type Case {
  id: Int!
  title: String!
  description: String
  status: CaseStatus!
  isPrivate: Boolean!
  accessDenied: Boolean!
  channelUserCount: Int!
  channelUsers(limit: Int, offset: Int, filter: String): ChannelUserConnection!
  reporterID: String
  reporter: SlackUser
  assigneeIDs: [String!]!
  assignees: [SlackUser!]!
  slackChannelID: String
  slackChannelName: String
  slackChannelURL: String
  fields: [FieldValue!]!       # Resolved from case_field_values via DataLoader
  # actions exposes the case's actions. The `filter` argument selects which
  # archive slice to return (ACTIVE / ARCHIVED / ALL); the default ACTIVE
  # matches the historical default for sub-resolvers. Each slice goes
  # through its own dataloader so callers can mix filters within a request.
  actions(filter: ActionArchiveFilter = ACTIVE): [Action!]!
  slackMessages(limit: Int, cursor: String): SlackMessageConnection!
  createdAt: Time!
  updatedAt: Time!
}

type Action {
  id: Int!
  caseID: Int!
  case: Case
  title: String!
  description: String
  assigneeID: String
  assignee: SlackUser
  slackMessageTS: String
  # Action status id. Validity is workspace-scoped: clients should resolve the
  # display name / color / emoji from FieldConfiguration.actionConfig.
  status: String!
  dueDate: Time
  # archived is true when the action is in the archived state (i.e. hidden from
  # default Kanban / Case detail views). Mirrors archivedAt != null.
  archived: Boolean!
  archivedAt: Time
  createdAt: Time!
  updatedAt: Time!
  messages(limit: Int, cursor: String): SlackMessageConnection!
  events(limit: Int, cursor: String): ActionEventConnection!
  # ActionStep listing under this Action, ordered by createdAt asc.
  steps: [ActionStep!]!
  # Aggregate progress over the Action's steps. Both fields are 0 when the
  # caller cannot access the parent Case (private case + non-member).
  stepProgress: ActionStepProgress!
}

enum ActionEventKind {
  CREATED
  TITLE_CHANGED
  STATUS_CHANGED
  ASSIGNEE_CHANGED
  ARCHIVED
  UNARCHIVED
  STEP_ADDED
  STEP_REMOVED
  STEP_DONE
  STEP_REOPENED
  STEP_TITLE_CHANGED
}

# ActionStep is a small, binary-state work item under an Action. Tracks
# granular progress; surfaces in the Action detail UI and as a done/total
# badge on Kanban cards. WebUI hides metadata other than checkbox + title.
type ActionStep {
  id: String!
  actionID: Int!
  title: String!
  # done mirrors doneAt != null. Convenience for clients that only need the
  # boolean; doneAt is the canonical source.
  done: Boolean!
  doneAt: Time
  doneBy: String
  doneByUser: SlackUser
  createdBy: String!
  createdByUser: SlackUser
  createdAt: Time!
  updatedAt: Time!
}

type ActionStepProgress {
  done: Int!
  total: Int!
}

# ActionArchiveFilter selects which archive slice an action list resolver
# should return.
enum ActionArchiveFilter {
  # ACTIVE returns only non-archived actions. Default for every Action
  # list resolver.
  ACTIVE
  # ARCHIVED returns only archived actions.
  ARCHIVED
  # ALL returns both active and archived actions. Intended for cleanup /
  # batch operations; UI views should use ACTIVE or ARCHIVED.
  ALL
}

# ActionEvent records a single change to an Action, surfaced in the
# WebUI activity feed alongside thread messages.
type ActionEvent {
  id: String!
  actionID: Int!
  kind: ActionEventKind!
  actorID: String!
  actor: SlackUser
  oldValue: String!
  newValue: String!
  createdAt: Time!
}

type ActionEventConnection {
  items: [ActionEvent!]!
  nextCursor: String!
}

# Inputs
input CreateCaseInput {
  title: String!
  description: String
  assigneeIDs: [String!]
  fields: [FieldValueInput!]
  isPrivate: Boolean
}

# CreateDraftInput mirrors CreateCaseInput but every field is optional —
# drafts are by definition in-progress and the user may save with an empty
# title, no assignees, etc. The eventual SubmitDraft is what enforces a
# non-empty title before promoting the case to OPEN.
input CreateDraftInput {
  title: String
  description: String
  assigneeIDs: [String!]
  fields: [FieldValueInput!]
  isPrivate: Boolean
}

input UpdateCaseInput {
  id: Int!
  # All fields below are optional. Omitted fields preserve their current value
  # on the existing Case. This allows true partial updates from clients that
  # only want to change one thing (e.g. inline edit of assignees).
  title: String
  description: String
  assigneeIDs: [String!]
  fields: [FieldValueInput!]
}

# SubmitDraftInput carries the last-minute edits that the user wants to
# apply *atomically* before the draft is promoted to OPEN. Pre-submit edit
# and promote-to-OPEN are one business operation, so they go through one
# usecase call — splitting them across an updateCase + submitDraft pair
# at the client risks leaving an inconsistent draft behind on failure.
input SubmitDraftInput {
  title: String
  description: String
  assigneeIDs: [String!]
  fields: [FieldValueInput!]
}

input CreateActionInput {
  caseID: Int!
  title: String!
  description: String
  assigneeID: String
  slackMessageTS: String
  # Status id. Must match a status defined for the workspace.
  status: String
  dueDate: Time
}

input UpdateActionInput {
  id: Int!
  caseID: Int
  title: String
  description: String
  assigneeID: String
  slackMessageTS: String
  # Status id. Must match a status defined for the workspace.
  status: String
  dueDate: Time
  clearDueDate: Boolean
  clearAssignee: Boolean
}

input AddActionStepInput {
  actionId: Int!
  title: String!
}

input SetActionStepDoneInput {
  actionId: Int!
  stepId: String!
  done: Boolean!
}

input RenameActionStepInput {
  actionId: Int!
  stepId: String!
  title: String!
}

input DeleteActionStepInput {
  actionId: Int!
  stepId: String!
}

# Slack User
type SlackUser {
  id: String!
  name: String!
  realName: String!
  imageUrl: String
}

# Source types
enum SourceType {
  NOTION_DB
  NOTION_PAGE
  SLACK
  GITHUB
}

type Source {
  id: String!
  name: String!
  sourceType: SourceType!
  description: String!
  enabled: Boolean!
  config: SourceConfig!
  createdAt: Time!
  updatedAt: Time!
}

union SourceConfig = NotionDBConfig | NotionPageConfig | SlackConfig | GitHubConfig

type NotionDBConfig {
  databaseID: String!
  databaseTitle: String!
  databaseURL: String!
}

type NotionPageConfig {
  pageID: String!
  pageTitle: String!
  pageURL: String!
  recursive: Boolean!
  maxDepth: Int!
}

type SlackConfig {
  channels: [SlackChannel!]!
}

type SlackChannel {
  id: String!
  name: String!
}

type GitHubConfig {
  repositories: [GitHubRepository!]!
}

type GitHubRepository {
  owner: String!
  repo: String!
}

input CreateGitHubSourceInput {
  name: String
  description: String
  repositories: [String!]!
  enabled: Boolean
}

input UpdateGitHubSourceInput {
  id: String!
  name: String
  description: String
  repositories: [String!]
  enabled: Boolean
}

type GitHubRepoValidationResult {
  valid: Boolean!
  owner: String
  repo: String
  fullName: String
  description: String
  isPrivate: Boolean
  pullRequestCount: Int
  issueCount: Int
  canFetchPullRequests: Boolean!
  canFetchIssues: Boolean!
  errorMessage: String
}

input CreateNotionDBSourceInput {
  name: String
  description: String
  databaseID: String!
  enabled: Boolean
}

input CreateNotionPageSourceInput {
  name: String
  description: String
  pageID: String!
  enabled: Boolean
  recursive: Boolean
  maxDepth: Int
}

input UpdateSourceInput {
  id: String!
  name: String
  description: String
  enabled: Boolean
}

type NotionDBValidationResult {
  valid: Boolean!
  databaseTitle: String
  databaseURL: String
  errorMessage: String
}

type NotionPageValidationResult {
  valid: Boolean!
  pageTitle: String
  pageURL: String
  errorMessage: String
}

input CreateSlackSourceInput {
  name: String
  description: String
  channelIDs: [String!]!
  enabled: Boolean
}

input UpdateSlackSourceInput {
  id: String!
  name: String
  description: String
  channelIDs: [String!]
  enabled: Boolean
}

type SlackChannelInfo {
  id: String!
  name: String!
}

# Assist Logs
type AssistLog {
  id: ID!
  caseId: Int!
  summary: String!
  actions: String!
  reasoning: String!
  nextSteps: String!
  createdAt: Time!
}

type AssistLogConnection {
  items: [AssistLog!]!
  totalCount: Int!
  hasMore: Boolean!
}

type Query {
  health: String!

  # Workspaces
  workspace(workspaceId: String!): Workspace!
  workspaces: [Workspace!]!

  # Cases
  cases(workspaceId: String!, status: CaseStatus): [Case!]!
  case(workspaceId: String!, id: Int!): Case

  # Drafts authored by the current user in this workspace. Draft cases are
  # only visible to their reporter and never appear in the general `cases`
  # listing; the dedicated query keeps that author-scoped path explicit and
  # avoids piggybacking on the more general filter.
  drafts(workspaceId: String!): [Case!]!

  # Actions
  # `filter` defaults to ACTIVE so default views never accidentally surface
  # archived actions. Use ARCHIVED for the archive view and ALL for batch
  # / cleanup operations that need both slices.
  actions(workspaceId: String!, filter: ActionArchiveFilter = ACTIVE): [Action!]!
  action(workspaceId: String!, id: Int!): Action
  actionsByCase(workspaceId: String!, caseID: Int!, filter: ActionArchiveFilter = ACTIVE): [Action!]!
  openCaseActions(workspaceId: String!): [Action!]!

  # Configuration
  fieldConfiguration(workspaceId: String!): FieldConfiguration!

  # Slack (not workspace-scoped)
  slackUsers: [SlackUser!]!
  slackJoinedChannels: [SlackChannelInfo!]!

  # Sources
  sources(workspaceId: String!): [Source!]!
  source(workspaceId: String!, id: String!): Source
  validateGitHubRepo(workspaceId: String!, repository: String!): GitHubRepoValidationResult!

  # Assist Logs
  assistLogs(workspaceId: String!, caseId: Int!, limit: Int, offset: Int): AssistLogConnection!
}

type Mutation {
  noop: Boolean

  # Cases
  createCase(workspaceId: String!, input: CreateCaseInput!): Case!
  updateCase(workspaceId: String!, input: UpdateCaseInput!): Case!
  deleteCase(workspaceId: String!, id: Int!): Boolean!
  closeCase(workspaceId: String!, id: Int!): Case!
  reopenCase(workspaceId: String!, id: Int!): Case!
  syncCaseChannelUsers(workspaceId: String!, id: Int!): Case!

  # Persist the supplied form payload as a DRAFT case. No Slack channel
  # is created and no notifications fire; the resulting case is visible
  # only to its reporter until SubmitDraft promotes it to OPEN.
  createDraft(workspaceId: String!, input: CreateDraftInput!): Case!

  # Promote a draft case to OPEN, running the same activation side effects
  # (Slack channel, invites, etc.) as a fresh createCase. The optional
  # `input` lets the caller apply last-minute edits atomically in the same
  # transaction; without it the existing draft state is promoted as-is.
  submitDraft(workspaceId: String!, id: Int!, input: SubmitDraftInput): Case!

  # Permanently delete the caller's own draft case. Discarding does NOT
  # apply to non-draft cases (deleteCase is the path for those); the mutation
  # errors if the target is OPEN/CLOSED.
  discardDraft(workspaceId: String!, id: Int!): Boolean!

  # Actions
  createAction(workspaceId: String!, input: CreateActionInput!): Action!
  updateAction(workspaceId: String!, input: UpdateActionInput!): Action!
  # Archive an action so it disappears from default Kanban / Case detail views.
  # Archived actions remain in storage and can be restored via unarchiveAction.
  archiveAction(workspaceId: String!, id: Int!): Action!
  # Restore a previously archived action back to active state.
  unarchiveAction(workspaceId: String!, id: Int!): Action!
  # Posts the Slack message for an Action whose initial post was missed
  # (legacy tool-created actions before the create paths were unified).
  # Errors if the action already has a Slack message timestamp or if the
  # parent Case has no Slack channel.
  postActionSlackMessage(workspaceId: String!, id: Int!): Action!

  # Action Steps — binary-state sub-items under an Action.
  addActionStep(workspaceId: String!, input: AddActionStepInput!): ActionStep!
  setActionStepDone(workspaceId: String!, input: SetActionStepDoneInput!): ActionStep!
  renameActionStep(workspaceId: String!, input: RenameActionStepInput!): ActionStep!
  deleteActionStep(workspaceId: String!, input: DeleteActionStepInput!): Boolean!

  # Sources
  createNotionDBSource(workspaceId: String!, input: CreateNotionDBSourceInput!): Source!
  createNotionPageSource(workspaceId: String!, input: CreateNotionPageSourceInput!): Source!
  createSlackSource(workspaceId: String!, input: CreateSlackSourceInput!): Source!
  createGitHubSource(workspaceId: String!, input: CreateGitHubSourceInput!): Source!
  updateSource(workspaceId: String!, input: UpdateSourceInput!): Source!
  updateSlackSource(workspaceId: String!, input: UpdateSlackSourceInput!): Source!
  updateGitHubSource(workspaceId: String!, input: UpdateGitHubSourceInput!): Source!
  deleteSource(workspaceId: String!, id: String!): Boolean!
  validateNotionDB(workspaceId: String!, databaseID: String!): NotionDBValidationResult!
  validateNotionPage(workspaceId: String!, pageID: String!): NotionPageValidationResult!
}
