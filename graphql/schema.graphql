scalar Time
scalar JSON
scalar Any

# Workspace
type Workspace {
  id: String!
  name: String!
}

# Field type definitions
enum FieldType {
  TEXT
  NUMBER
  SELECT
  MULTI_SELECT
  USER
  MULTI_USER
  DATE
  URL
  CASE_REF
  MULTI_CASE_REF
}

type FieldOption {
  id: String!
  name: String!
  description: String
  metadata: JSON  # Arbitrary metadata (e.g., {"score": 4})
}

type FieldDefinition {
  id: String!
  name: String!
  type: FieldType!
  required: Boolean!
  description: String
  options: [FieldOption!]
  referenceWorkspaceId: String
}

"A referenceable case (non-private, non-draft) used by case_ref fields."
type CaseRef {
  id: Int!
  title: String!
  status: CaseStatus!
  workspaceId: String!
}

type EntityLabels {
  case: String!
}

type FieldConfiguration {
  fields: [FieldDefinition!]!
  labels: EntityLabels!
  actionConfig: ActionConfig!
}

# ActionStatusDefinition describes a single action status configurable per
# workspace in TOML. `name` is the display label written by the workspace
# operator in whatever language they prefer. `color` is either a semantic
# preset name or a #RRGGBB hex code. See the user-facing config docs for
# the accepted preset list.
type ActionStatusDefinition {
  id: ID!
  name: String!
  description: String
  color: String
  emoji: String
}

# ActionConfig is the resolved per-workspace action status configuration.
# `initial` is the id of the status assigned to newly created actions.
# `closed` lists the status ids that are treated as closed for filtering /
# completion checks. `statuses` is the full ordered list to render.
type ActionConfig {
  initial: ID!
  closed: [ID!]!
  statuses: [ActionStatusDefinition!]!
}

# Custom field value
type FieldValue {
  fieldId: String!
  # Value encoded as JSON. Clients parse based on field type from FieldConfiguration.
  value: Any!
}

input FieldValueInput {
  fieldId: String!
  value: Any!
}

# Slack file attachment metadata
type SlackFile {
  id: String!
  name: String!
  mimetype: String!
  filetype: String!
  size: Int!
  urlPrivate: String!
  permalink: String!
  thumbURL: String
}

# Slack Message (stored in case sub-collection)
type SlackMessage {
  id: String!
  channelID: String!
  threadTS: String
  teamID: String!
  userID: String!
  userName: String!
  text: String!
  files: [SlackFile!]!
  createdAt: Time!
}

type SlackMessageConnection {
  items: [SlackMessage!]!
  nextCursor: String!
}

# CaseStatus is the lifecycle state of a Case.
# Lifecycle: DRAFT → OPEN → CLOSED (CLOSED can return to OPEN via reopenCase).
# DRAFT is reserved for entries saved through Slack's "Save as Draft" button
# on the case-creation modal; drafts are visible only to their reporter,
# excluded from the default `cases` listing, and surfaced through the
# dedicated `drafts` query.
enum CaseStatus {
  DRAFT
  OPEN
  CLOSED
}

# Channel user connection for paginated member lists
type ChannelUserConnection {
  items: [SlackUser!]!
  totalCount: Int!
  hasMore: Boolean!
}

# Entity types
type Case {
  id: Int!
  title: String!
  description: String
  status: CaseStatus!
  isPrivate: Boolean!
  accessDenied: Boolean!
  channelUserCount: Int!
  channelUsers(limit: Int, offset: Int, filter: String): ChannelUserConnection!
  reporterID: String
  reporter: SlackUser
  assigneeIDs: [String!]!
  assignees: [SlackUser!]!
  slackChannelID: String
  slackChannelName: String
  slackChannelURL: String
  # slackThreadTS is set for thread-mode cases (the Slack thread the case is
  # bound to); null for channel-mode cases.
  slackThreadTS: String
  # isThreadBound is true for thread-mode cases (slackThreadTS != ""). The UI
  # uses it to hide the Actions tab and link to the Slack thread.
  isThreadBound: Boolean!
  # boardStatus is the configurable workflow status id (the Kanban column) for
  # thread-mode cases; null for channel-mode cases. Validity is workspace-
  # scoped: resolve display from caseStatusConfig.
  boardStatus: String
  fields: [FieldValue!]!       # Resolved from case_field_values via DataLoader
  # actions exposes the case's actions. The `filter` argument selects which
  # archive slice to return (ACTIVE / ARCHIVED / ALL); the default ACTIVE
  # matches the historical default for sub-resolvers. Each slice goes
  # through its own dataloader so callers can mix filters within a request.
  actions(filter: ActionArchiveFilter = ACTIVE): [Action!]!
  slackMessages(limit: Int, cursor: String): SlackMessageConnection!
  # Case-specific Markdown snippet appended to the Job system prompt
  # at agent execution time. Empty string when unset.
  agentAdditionalPrompt: String!
  # Sources the agent should consider when running against this Case.
  # Empty list (the default) means "use every Workspace Source"; non-
  # empty narrows the agent to exactly those Sources.
  agentSources: [Source!]!
  createdAt: Time!
  updatedAt: Time!
}

type Action {
  id: Int!
  caseID: Int!
  case: Case
  title: String!
  description: String
  assigneeID: String
  assignee: SlackUser
  slackMessageTS: String
  # Action status id. Validity is workspace-scoped: clients should resolve the
  # display name / color / emoji from FieldConfiguration.actionConfig.
  status: String!
  dueDate: Time
  # archived is true when the action is in the archived state (i.e. hidden from
  # default Kanban / Case detail views). Mirrors archivedAt != null.
  archived: Boolean!
  archivedAt: Time
  createdAt: Time!
  updatedAt: Time!
  messages(limit: Int, cursor: String): SlackMessageConnection!
  events(limit: Int, cursor: String): ActionEventConnection!
  # ActionStep listing under this Action, ordered by createdAt asc.
  steps: [ActionStep!]!
  # Aggregate progress over the Action's steps. Both fields are 0 when the
  # caller cannot access the parent Case (private case + non-member).
  stepProgress: ActionStepProgress!
}

enum ActionEventKind {
  CREATED
  TITLE_CHANGED
  STATUS_CHANGED
  ASSIGNEE_CHANGED
  ARCHIVED
  UNARCHIVED
  STEP_ADDED
  STEP_REMOVED
  STEP_DONE
  STEP_REOPENED
  STEP_TITLE_CHANGED
}

# ActionStep is a small, binary-state work item under an Action. Tracks
# granular progress; surfaces in the Action detail UI and as a done/total
# badge on Kanban cards. WebUI hides metadata other than checkbox + title.
type ActionStep {
  id: String!
  actionID: Int!
  title: String!
  # done mirrors doneAt != null. Convenience for clients that only need the
  # boolean; doneAt is the canonical source.
  done: Boolean!
  doneAt: Time
  doneBy: String
  doneByUser: SlackUser
  createdBy: String!
  createdByUser: SlackUser
  createdAt: Time!
  updatedAt: Time!
}

type ActionStepProgress {
  done: Int!
  total: Int!
}

# ActionArchiveFilter selects which archive slice an action list resolver
# should return.
enum ActionArchiveFilter {
  # ACTIVE returns only non-archived actions. Default for every Action
  # list resolver.
  ACTIVE
  # ARCHIVED returns only archived actions.
  ARCHIVED
  # ALL returns both active and archived actions. Intended for cleanup /
  # batch operations; UI views should use ACTIVE or ARCHIVED.
  ALL
}

# MemoArchiveFilter selects which archive slice a memo list resolver returns.
enum MemoArchiveFilter {
  # ACTIVE returns only non-archived memos. Default for memosByCase.
  ACTIVE
  # ARCHIVED returns only archived memos.
  ARCHIVED
  # ALL returns both active and archived memos.
  ALL
}

# Memo is a Case-scoped note that records facts, observations, hypotheses,
# or decisions accumulated while working the Case. Like a Case it carries
# workspace-defined custom field values.
type Memo {
  id: ID!
  caseID: Int!
  case: Case
  title: String!
  fields: [FieldValue!]!
  # archivedAt is null for an active memo and non-null once archived.
  # There is no derived `archived` boolean; callers derive it from archivedAt != null.
  archivedAt: Time
  createdAt: Time!
  updatedAt: Time!
}

# MemoConfiguration describes a workspace's memo configuration for the WebUI.
# When the workspace has not enabled memos, the resolver returns a non-null
# object with an empty fields list; the frontend uses that to hide the Memos tab.
type MemoConfiguration {
  description: String!
  fields: [FieldDefinition!]!
}

input CreateMemoInput {
  caseID: Int!
  title: String!
  fields: [FieldValueInput!]
}

input UpdateMemoInput {
  id: ID!
  caseID: Int!
  title: String
  fields: [FieldValueInput!]
}

# ActionEvent records a single change to an Action, surfaced in the
# WebUI activity feed alongside thread messages.
type ActionEvent {
  id: String!
  actionID: Int!
  kind: ActionEventKind!
  actorID: String!
  actor: SlackUser
  oldValue: String!
  newValue: String!
  createdAt: Time!
}

type ActionEventConnection {
  items: [ActionEvent!]!
  nextCursor: String!
}

# Inputs
input CreateCaseInput {
  title: String!
  description: String
  assigneeIDs: [String!]
  fields: [FieldValueInput!]
  isPrivate: Boolean
}

# CreateDraftInput mirrors CreateCaseInput but every field is optional —
# drafts are by definition in-progress and the user may save with an empty
# title, no assignees, etc. The eventual SubmitDraft is what enforces a
# non-empty title before promoting the case to OPEN.
input CreateDraftInput {
  title: String
  description: String
  assigneeIDs: [String!]
  fields: [FieldValueInput!]
  isPrivate: Boolean
}

input UpdateCaseInput {
  id: Int!
  # All fields below are optional. Omitted fields preserve their current value
  # on the existing Case. This allows true partial updates from clients that
  # only want to change one thing. Assignees are NOT updatable here — use the
  # assignCase / unassignCase delta mutations so concurrent edits cannot
  # clobber one another.
  title: String
  description: String
  fields: [FieldValueInput!]
}

# SubmitDraftInput carries the last-minute edits that the user wants to
# apply *atomically* before the draft is promoted to OPEN. Pre-submit edit
# and promote-to-OPEN are one business operation, so they go through one
# usecase call — splitting them across an updateCase + submitDraft pair
# at the client risks leaving an inconsistent draft behind on failure.
# Assignees are NOT part of this input — manage them via assignCase /
# unassignCase on the draft before submitting.
input SubmitDraftInput {
  title: String
  description: String
  fields: [FieldValueInput!]
}

input CreateActionInput {
  caseID: Int!
  title: String!
  description: String
  assigneeID: String
  slackMessageTS: String
  # Status id. Must match a status defined for the workspace.
  status: String
  dueDate: Time
}

input UpdateActionInput {
  id: Int!
  caseID: Int
  title: String
  description: String
  assigneeID: String
  slackMessageTS: String
  # Status id. Must match a status defined for the workspace.
  status: String
  dueDate: Time
  clearDueDate: Boolean
  clearAssignee: Boolean
}

input UpdateCaseStatusInput {
  id: Int!
  # Board status id. Must match a status defined in the workspace's
  # [case.status] configuration.
  status: String!
}

input AddActionStepInput {
  actionId: Int!
  title: String!
}

input SetActionStepDoneInput {
  actionId: Int!
  stepId: String!
  done: Boolean!
}

input RenameActionStepInput {
  actionId: Int!
  stepId: String!
  title: String!
}

input DeleteActionStepInput {
  actionId: Int!
  stepId: String!
}

# Slack User
type SlackUser {
  id: String!
  name: String!
  realName: String!
  imageUrl: String
}

