# Assist Logs
type AssistLog {
  id: ID!
  caseId: Int!
  summary: String!
  actions: String!
  reasoning: String!
  nextSteps: String!
  createdAt: Time!
}

type AssistLogConnection {
  items: [AssistLog!]!
  totalCount: Int!
  hasMore: Boolean!
}

type Query {
  health: String!

  # Workspaces
  workspace(workspaceId: String!): Workspace!
  workspaces: [Workspace!]!

  # Cases
  cases(workspaceId: String!, status: CaseStatus): [Case!]!
  case(workspaceId: String!, id: Int!): Case

  # Drafts authored by the current user in this workspace. Draft cases are
  # only visible to their reporter and never appear in the general `cases`
  # listing; the dedicated query keeps that author-scoped path explicit and
  # avoids piggybacking on the more general filter.
  drafts(workspaceId: String!): [Case!]!

  "List non-private referenceable cases in the target workspace for a case_ref picker. query filters by title substring or case ID; limit caps results (default/max 50)."
  referenceableCases(workspaceId: String!, query: String, limit: Int): [CaseRef!]!
  "Resolve specific case IDs to their referenceable (non-private, non-draft) summaries. Missing/private/draft IDs are omitted."
  caseRefsByIds(workspaceId: String!, ids: [Int!]!): [CaseRef!]!

  # Actions
  # `filter` defaults to ACTIVE so default views never accidentally surface
  # archived actions. Use ARCHIVED for the archive view and ALL for batch
  # / cleanup operations that need both slices.
  actions(workspaceId: String!, filter: ActionArchiveFilter = ACTIVE): [Action!]!
  action(workspaceId: String!, id: Int!): Action
  actionsByCase(workspaceId: String!, caseID: Int!, filter: ActionArchiveFilter = ACTIVE): [Action!]!
  openCaseActions(workspaceId: String!): [Action!]!

  # Configuration
  fieldConfiguration(workspaceId: String!): FieldConfiguration!

  # caseStatusConfig returns the configurable Case status set (the Kanban
  # columns) for a thread-mode workspace, or null for channel-mode workspaces.
  # Reuses the ActionConfig shape since both are generic status sets.
  caseStatusConfig(workspaceId: String!): ActionConfig

  # Slack (not workspace-scoped)
  slackUsers: [SlackUser!]!
  slackJoinedChannels: [SlackChannelInfo!]!

  # Sources
  sources(workspaceId: String!): [Source!]!
  source(workspaceId: String!, id: String!): Source
  validateGitHubRepo(workspaceId: String!, repository: String!): GitHubRepoValidationResult!

  # Assist Logs
  assistLogs(workspaceId: String!, caseId: Int!, limit: Int, offset: Int): AssistLogConnection!

  # Agent (Job) execution history surfaced under a single Case. The page
  # walks every Job that has run against the Case and returns logs in
  # newest-first order. `first` defaults to 20 and is clamped to 100;
  # `after` is the opaque cursor returned from the previous page.
  caseJobRunLogs(workspaceId: String!, caseId: Int!, first: Int, after: String): JobRunLogConnection!

  # Single JobRunLog identified by its RunID under the given Case. The
  # JobID is resolved server-side, so the client does not need it.
  jobRunLog(workspaceId: String!, caseId: Int!, runId: String!): JobRunLog!

  # Full event timeline of one Run in ascending Sequence order.
  jobRunEvents(workspaceId: String!, caseId: Int!, runId: String!): [JobRunEvent!]!

  # Case Import — single session lookup. Sessions are scoped to the creator;
  # the resolver returns "not found" for sessions owned by other users even
  # when the ID is known.
  caseImport(workspaceId: String!, id: ID!): ImportSession!

  # Memos — Case-scoped notes with workspace-defined custom fields.
  # `filter` defaults to ACTIVE so default views never surface archived memos.
  memosByCase(workspaceId: String!, caseID: Int!, filter: MemoArchiveFilter = ACTIVE): [Memo!]!
  memo(workspaceId: String!, caseID: Int!, id: ID!): Memo
  # memoConfiguration returns the workspace memo feature settings. The result
  # is non-null; when memos are disabled the returned object has an empty
  # fields list so the frontend can hide the Memos tab.
  memoConfiguration(workspaceId: String!): MemoConfiguration!
}

type Mutation {
  noop: Boolean

  # Cases
  createCase(workspaceId: String!, input: CreateCaseInput!): Case!
  updateCase(workspaceId: String!, input: UpdateCaseInput!): Case!
  # assignCase / unassignCase mutate the assignee set by delta rather than
  # replacing the whole list (updateCase). The add/remove is applied as a
  # transactional set operation server-side, so concurrent "assign me" actions
  # cannot clobber one another. Adding an already-assigned user (or removing an
  # absent one) is a no-op. Returns the updated case.
  assignCase(workspaceId: String!, id: Int!, userIDs: [String!]!): Case!
  unassignCase(workspaceId: String!, id: Int!, userIDs: [String!]!): Case!
  deleteCase(workspaceId: String!, id: Int!): Boolean!
  closeCase(workspaceId: String!, id: Int!): Case!
  reopenCase(workspaceId: String!, id: Int!): Case!
  # updateCaseStatus sets a thread-mode case's board status (Kanban column).
  # The lifecycle status is synced server-side (a closed board status closes
  # the case). Used by the Kanban drag-and-drop.
  updateCaseStatus(workspaceId: String!, input: UpdateCaseStatusInput!): Case!
  syncCaseChannelUsers(workspaceId: String!, id: Int!): Case!

  # Persist the supplied form payload as a DRAFT case. No Slack channel
  # is created and no notifications fire; the resulting case is visible
  # only to its reporter until SubmitDraft promotes it to OPEN.
  createDraft(workspaceId: String!, input: CreateDraftInput!): Case!

  # Promote a draft case to OPEN, running the same activation side effects
  # (Slack channel, invites, etc.) as a fresh createCase. The optional
  # `input` lets the caller apply last-minute edits atomically in the same
  # transaction; without it the existing draft state is promoted as-is.
  submitDraft(workspaceId: String!, id: Int!, input: SubmitDraftInput): Case!

  # Permanently delete the caller's own draft case. Discarding does NOT
  # apply to non-draft cases (deleteCase is the path for those); the mutation
  # errors if the target is OPEN/CLOSED.
  discardDraft(workspaceId: String!, id: Int!): Boolean!

  # Actions
  createAction(workspaceId: String!, input: CreateActionInput!): Action!
  updateAction(workspaceId: String!, input: UpdateActionInput!): Action!
  # Archive an action so it disappears from default Kanban / Case detail views.
  # Archived actions remain in storage and can be restored via unarchiveAction.
  archiveAction(workspaceId: String!, id: Int!): Action!
  # Restore a previously archived action back to active state.
  unarchiveAction(workspaceId: String!, id: Int!): Action!
  # Posts the Slack message for an Action whose initial post was missed
  # (legacy tool-created actions before the create paths were unified).
  # Errors if the action already has a Slack message timestamp or if the
  # parent Case has no Slack channel.
  postActionSlackMessage(workspaceId: String!, id: Int!): Action!

  # Action Steps — binary-state sub-items under an Action.
  addActionStep(workspaceId: String!, input: AddActionStepInput!): ActionStep!
  setActionStepDone(workspaceId: String!, input: SetActionStepDoneInput!): ActionStep!
  renameActionStep(workspaceId: String!, input: RenameActionStepInput!): ActionStep!
  deleteActionStep(workspaceId: String!, input: DeleteActionStepInput!): Boolean!

  # Sources
  createNotionDBSource(workspaceId: String!, input: CreateNotionDBSourceInput!): Source!
  createNotionPageSource(workspaceId: String!, input: CreateNotionPageSourceInput!): Source!
  createSlackSource(workspaceId: String!, input: CreateSlackSourceInput!): Source!
  createGitHubSource(workspaceId: String!, input: CreateGitHubSourceInput!): Source!
  updateSource(workspaceId: String!, input: UpdateSourceInput!): Source!
  updateSlackSource(workspaceId: String!, input: UpdateSlackSourceInput!): Source!
  updateGitHubSource(workspaceId: String!, input: UpdateGitHubSourceInput!): Source!
  updateNotionDBSource(workspaceId: String!, input: UpdateNotionDBSourceInput!): Source!
  updateNotionPageSource(workspaceId: String!, input: UpdateNotionPageSourceInput!): Source!
  deleteSource(workspaceId: String!, id: String!): Boolean!
  validateNotionDB(workspaceId: String!, databaseID: String!): NotionDBValidationResult!
  validateNotionPage(workspaceId: String!, pageID: String!): NotionPageValidationResult!

  # Replace the Case-scoped agent additional prompt and Source allowlist
  # atomically. enabledSourceIds is treated as the full new selection:
  # passing an empty list clears it (= "use every Source"); the order is
  # preserved verbatim so the UI round-trips unchanged.
  updateCaseAgentSettings(workspaceId: String!, input: UpdateCaseAgentSettingsInput!): Case!

  # Case Import — create a pending ImportSession from raw YAML content.
  # The session is persisted to Firestore and identified by an ImportSessionID
  # (returned in `id`). The caller is captured from the auth context and
  # becomes the only principal allowed to read or execute the session.
  createCaseImport(workspaceId: String!, input: CreateCaseImportInput!): ImportSession!

  # Case Import — execute the persisted snapshot (Case/Action creation).
  # Allowed only when status==PENDING and the session is `valid`. Fails
  # with an explicit error if the workspace field schema has drifted
  # since createCaseImport (issues are appended to the session for the
  # detail UI to display).
  executeCaseImport(workspaceId: String!, id: ID!): ImportSession!

  # Memos — Case-scoped notes with workspace-defined custom fields.
  createMemo(workspaceId: String!, input: CreateMemoInput!): Memo!
  updateMemo(workspaceId: String!, input: UpdateMemoInput!): Memo!
  # archiveMemo soft-deletes a memo (sets archivedAt). Idempotent.
  archiveMemo(workspaceId: String!, caseID: Int!, id: ID!): Memo!
  # unarchiveMemo restores a soft-deleted memo (clears archivedAt).
  unarchiveMemo(workspaceId: String!, caseID: Int!, id: ID!): Memo!
}

input UpdateCaseAgentSettingsInput {
  caseId: Int!
  agentAdditionalPrompt: String!
  enabledSourceIds: [String!]!
}

# JobRunStage mirrors model.JobRunStage and is what the frontend uses
# to render the Status pill in the run log table and detail header.
enum JobRunStage {
  RUNNING
  SUCCESS
  FAILED
}

# Cursor-paginated slice of JobRunLogs for one Case. nextCursor is null
# when the caller has reached the end of the history.
type JobRunLogConnection {
  items: [JobRunLog!]!
  nextCursor: String
}

# JobStrategy mirrors model.JobStrategy. The frontend uses it to render
# a chip on the JobRunLog detail row so operators can tell at a glance
# whether the Job ran through the single-loop or plan-and-execute
# runtime. SIMPLE corresponds to the v1 SingleLoopJobExecutor;
# PLANEXEC corresponds to the planexec (plan-and-execute) runtime
# shared with the proposal mode.
enum JobStrategy {
  SIMPLE
  PLANEXEC
}

# One Job invocation against one Case. The fields mirror
# model.JobRunLog plus a server-resolved jobName (looked up from the
# Workspace TOML registry; falls back to jobId when unknown).
type JobRunLog {
  workspaceId: String!
  caseId: Int!
  jobId: String!
  jobName: String!
  # The strategy the Job ran under. Derived server-side from
  # model.JobRunLog.ExecutorKind ("single_loop" → SIMPLE,
  # "plan_execute" → PLANEXEC, anything else → SIMPLE as the safe
  # default).
  strategy: JobStrategy!
  runId: String!
  traceId: String!
  stage: JobRunStage!
  startedAt: Time!
  endedAt: Time
  # Wall-clock duration in milliseconds. Null while RUNNING.
  durationMs: Int
  # Non-null when the Run ended in FAILED; the message is the same one
  # the agent reported. Empty string for RUNNING / SUCCESS so the
  # frontend never has to special-case absence.
  errorMessage: String!
  systemPrompt: String!
  # Trigger provenance (case lifecycle vs scheduled cron) copied from
  # the Event that started this Run.
  eventType: String!
  eventTriggerAt: Time!
}

enum JobRunEventKind {
  LLM_REQUEST
  LLM_RESPONSE
  TOOL_CALL
  RUN_ERROR
}

# One entry on the JobRunLog detail timeline. The payload shape varies
# per Kind; we serialise it as a JSON blob so the frontend can render
# each type without needing four sibling fields on every event.
type JobRunEvent {
  eventId: String!
  runId: String!
  sequence: Int!
  occurredAt: Time!
  kind: JobRunEventKind!
  parentSequence: Int!
  phase: String!
  agentLabel: String!
  # Exactly one of the four payload-shaped objects, encoded as JSON
  # for transport simplicity. Schema: see model.LLMRequestPayload /
  # LLMResponsePayload / ToolCallPayload / RunErrorPayload.
  payload: JSON!
}

# ---- Case Import (YAML → Case/Action) ---------------------------------------
#
# Workflow: createCaseImport persists a normalized ImportSession in PENDING
# state from raw YAML. executeCaseImport advances it exactly once to
# APPLIED (all cases created) or FAILED (one or more failures; subsequent
# items are SKIPPED). Sessions are kept indefinitely and surfaced only by
# direct ID lookup — there is no list query.

enum ImportSessionStatus {
  PENDING
  APPLIED
  FAILED
}

enum ImportItemResultStatus {
  PENDING
  CREATED
  FAILED
  SKIPPED
}

enum ImportIssueSeverity {
  ERROR
  WARNING
}

# One validation or execution finding. `path` is a JSONPath-like locator
# such as "cases[0].fields.severity" that the frontend uses to highlight
# the offending value. `message` is already in the caller's language.
type ImportIssue {
  path: String!
  message: String!
  severity: ImportIssueSeverity!
}

# Metadata about the uploaded source YAML.
type ImportSource {
  originalFileName: String!
  sizeBytes: Int!
}

# Per-Case execution result. `createdCase` is hydrated via DataLoader and
# is null when the Case was deleted after applied.
type ImportCaseResult {
  status: ImportItemResultStatus!
  createdCase: Case
  createdCaseID: Int
  error: ImportIssue
}

type ImportActionResult {
  status: ImportItemResultStatus!
  createdAction: Action
  createdActionID: Int
  error: ImportIssue
}

# Pre-rendered key/value pair so the frontend does not need to know how
# each FieldValue type stringifies.
type ImportSnapshotField {
  key: String!
  display: String!
}

type ImportSnapshotAction {
  index: Int!
  title: String!
  description: String
  assigneeID: String
  dueDate: Time
  issues: [ImportIssue!]!
  result: ImportActionResult!
}

type ImportSnapshotCase {
  index: Int!
  title: String!
  description: String
  isPrivate: Boolean!
  assigneeIDs: [String!]!
  """Slack users referenced by assigneeIDs, resolved on the server. Lookup is
  batched per request so the frontend never has to ship the full slackUsers
  list. IDs that cannot be resolved are simply omitted from the array."""
  assignees: [SlackUser!]!
  fields: [ImportSnapshotField!]!
  actions: [ImportSnapshotAction!]!
  issues: [ImportIssue!]!
  result: ImportCaseResult!
}

type ImportSnapshot {
  version: Int!
  cases: [ImportSnapshotCase!]!
}

type ImportSession {
  id: ID!
  workspaceID: String!
  creatorUserID: String!
  status: ImportSessionStatus!
  source: ImportSource!
  snapshot: ImportSnapshot!
  # Session-level issues (YAML parse failure, version mismatch, schema
  # stale, etc.). Per-Case / per-Action issues live under snapshot.
  issues: [ImportIssue!]!
  # True iff there are no ERROR-severity issues anywhere; the Execute
  # button on the UI is gated on this flag.
  valid: Boolean!
  fieldSchemaHash: String!
  createdAt: Time!
  updatedAt: Time!
  executedAt: Time
  createdCount: Int!
  failedCount: Int!
  skippedCount: Int!
}

input CreateCaseImportInput {
  """Raw YAML content (UTF-8)."""
  content: String!
  """Optional original file name for display purposes."""
  originalFileName: String
}
